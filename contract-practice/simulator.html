<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solidity Lab Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0e27; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; }
        .code-font { font-family: 'Consolas', monospace; }
        .neon-border { border: 1px solid #7c3aed; box-shadow: 0 0 15px rgba(124, 58, 237, 0.3); }
        .neon-hover:hover { box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); border-color: #00d4ff; transform: translateY(-2px); transition: all 0.3s; }
        .bg-surface { background-color: #111633; }
        .bg-elevated { background-color: #1a1f4a; }
        .tab-active { border-bottom: 2px solid #00d4ff; color: #00d4ff; }
        #console-panel { max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="launcher" class="absolute inset-0 flex items-center justify-center z-50 bg-[#0a0e27]">
        <div class="bg-surface p-8 rounded-2xl neon-border text-center neon-hover cursor-pointer w-96" onclick="startLab()">
            <div class="text-4xl mb-4">⛓️</div>
            <h1 class="text-2xl font-bold mb-2 text-[#00d4ff]">Lab 1: Hello Solidity</h1>
            <p class="text-sm text-gray-400 mb-4">HelloWorld & HelloNumber 실습</p>
            <div class="flex justify-center gap-2 text-xs mb-4">
                <span class="bg-[#1a1f4a] px-2 py-1 rounded text-[#10b981]">기초 ★☆☆</span>
                <span class="bg-[#1a1f4a] px-2 py-1 rounded text-[#f59e0b]">~15분</span>
            </div>
            <button class="w-full bg-[#7c3aed] hover:bg-[#6d28d9] text-white py-2 rounded-lg transition">실습 시작하기 (단축키: 1)</button>
        </div>
    </div>

    <div id="lab-page" class="hidden flex-1 flex flex-col">
        <header class="bg-surface p-3 flex items-center justify-between border-b border-[#1a1f4a]">
            <div class="flex gap-4 items-center">
                <button onclick="showLauncher()" class="text-gray-400 hover:text-white px-2">← 런처</button>
                <div class="flex gap-2" id="tabs">
                    <button class="px-4 py-1 tab-active" onclick="switchTab(1)">1. HelloWorld</button>
                    <button class="px-4 py-1 text-gray-400" onclick="switchTab(2)">2. HelloWorld 확장</button>
                    <button class="px-4 py-1 text-gray-400" onclick="switchTab(3)">3. HelloNumber</button>
                </div>
            </div>
            <div class="text-sm">Account: <span class="text-[#00d4ff]">0x5B38... (100 ETH)</span></div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div class="w-1/3 border-r border-[#1a1f4a] flex flex-col">
                <div class="p-2 bg-elevated text-xs text-gray-400 flex justify-between">
                    <span>Code Editor</span>
                    <button onclick="resetCode()" class="hover:text-white">초기화</button>
                </div>
                <textarea id="editor" class="flex-1 bg-transparent p-4 outline-none resize-none code-font text-sm leading-relaxed" spellcheck="false"></textarea>
            </div>

            <div class="w-1/3 border-r border-[#1a1f4a] flex flex-col bg-surface p-4 gap-4">
                <div class="bg-elevated p-4 rounded-lg">
                    <h3 class="font-bold text-[#00d4ff] mb-2">실습 가이드</h3>
                    <ul id="guide-text" class="text-sm space-y-2 text-gray-300 list-decimal pl-4">
                        </ul>
                </div>
                
                <div class="flex flex-col gap-2 mt-auto">
                    <button id="btn-compile" onclick="compileCode()" class="bg-[#1a1f4a] hover:bg-gray-700 text-white py-3 rounded border border-gray-600">🔨 컴파일 (Ctrl+Enter)</button>
                    <button id="btn-deploy" onclick="deployCode()" class="bg-[#7c3aed] hover:bg-[#6d28d9] text-white py-3 rounded opacity-50 cursor-not-allowed" disabled>🚀 배포 (Deploy)</button>
                </div>
            </div>

            <div class="w-1/3 bg-surface p-4 flex flex-col">
                <h3 class="font-bold text-[#f59e0b] mb-4">Deployed Contracts</h3>
                <div id="interaction-panel" class="hidden flex-col gap-3">
                    <p class="text-xs text-gray-400 mb-2">계약이 배포되었습니다. 함수를 실행해보세요.</p>
                    <div id="functions-container" class="flex flex-col gap-2">
                        </div>
                </div>
                <div id="deploy-placeholder" class="text-sm text-gray-500 text-center mt-10">
                    컨트랙트를 먼저 배포하세요.
                </div>
            </div>
        </div>

        <div class="h-40 bg-[#0a0e27] border-t border-[#1a1f4a] flex flex-col">
            <div class="p-1 bg-elevated text-xs flex justify-between px-4">
                <span>Console</span>
                <button onclick="clearConsole()" class="hover:text-white">Clear</button>
            </div>
            <div id="console-panel" class="p-2 font-mono text-xs flex-1 space-y-1">
                <div class="text-gray-500">ℹ️ 시스템이 준비되었습니다. 코드를 작성하고 컴파일하세요.</div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-5 right-5 bg-[#10b981] text-white px-4 py-2 rounded shadow-lg transition-opacity duration-300 opacity-0 pointer-events-none">
        알림 메시지
    </div>

    <script>
        const codes = {
            1: `// SPDX-License-Identifier: MIT\npragma solidity ^0.8.26;\n\ncontract HelloWorld {\n    string public greet = "Hello World";\n}`,
            2: `// SPDX-License-Identifier: MIT\npragma solidity ^0.8.26;\n\ncontract HelloWorld {\n    string private _greeting = "Hello, World!";\n\n    function greet() public view returns (string memory) {\n        return _greeting;\n    }\n\n    function setGreeting(string memory newGreeting) public {\n        _greeting = newGreeting;\n    }\n}`,
            3: `// SPDX-License-Identifier: MIT\npragma solidity ^0.8.26;\n\ncontract HelloNumber {\n    int public number = 10;\n\n    // 도전과제: private으로 바꾸고\n    // getNumber, setNumber 함수를 만들어보세요!\n}`
        };

        const guides = {
            1: "<li>코드를 확인하세요. <code>string public greet</code></li><li><b>컴파일</b> 버튼을 누르세요.</li><li><b>배포</b> 버튼을 누르세요.</li><li>우측에서 <b>greet</b> 버튼 클릭!</li>",
            2: "<li><code>private</code> 변수와 함수를 확인하세요.</li><li>컴파일 → 배포</li><li><code>greet()</code>를 호출해보세요.</li><li><code>setGreeting</code>으로 값을 변경하세요.</li><li>다시 <code>greet()</code>를 호출하여 변경 확인!</li>",
            3: "<li><code>int</code> 타입 변수를 확인하세요.</li><li>컴파일 → 배포 → <code>number</code> 확인</li><li><b>도전과제:</b> <code>private</code>으로 바꾸고 getter/setter를 추가해보세요!</li>"
        };

        let currentTab = 1;
        let isCompiled = false;
        let isDeployed = false;
        let contractState = {};

        // 런처 시작
        function startLab() {
            document.getElementById('launcher').style.display = 'none';
            document.getElementById('lab-page').classList.remove('hidden');
            switchTab(1);
            logConsole("ℹ️ Lab 1 시작. 탭 1이 로드되었습니다.");
        }

        // 런처로 복귀
        function showLauncher() {
            document.getElementById('launcher').style.display = 'flex';
            document.getElementById('lab-page').classList.add('hidden');
        }

        // 탭 전환
        function switchTab(tabId) {
            currentTab = tabId;
            document.getElementById('editor').value = codes[tabId];
            document.getElementById('guide-text').innerHTML = guides[tabId];
            
            // UI 리셋
            isCompiled = false;
            isDeployed = false;
            document.getElementById('btn-deploy').disabled = true;
            document.getElementById('btn-deploy').classList.add('opacity-50', 'cursor-not-allowed');
            document.getElementById('interaction-panel').classList.add('hidden');
            document.getElementById('deploy-placeholder').classList.remove('hidden');

            // 탭 스타일 변경
            const tabs = document.getElementById('tabs').children;
            for(let i=0; i<tabs.length; i++) {
                tabs[i].className = i+1 === tabId ? "px-4 py-1 tab-active" : "px-4 py-1 text-gray-400 hover:text-gray-200";
            }
        }

        function resetCode() {
            document.getElementById('editor').value = codes[currentTab];
            logConsole("ℹ️ 코드가 초기화되었습니다.");
        }

        // 컴파일 시뮬레이션
        function compileCode() {
            isCompiled = true;
            document.getElementById('btn-deploy').disabled = false;
            document.getElementById('btn-deploy').classList.remove('opacity-50', 'cursor-not-allowed');
            showToast("✅ 컴파일 성공!");
            logConsole("✅ 컴파일 완료: 문법에 이상이 없습니다.");
        }

        // 배포 시뮬레이션
        function deployCode() {
            if (!isCompiled) return;
            isDeployed = true;
            document.getElementById('interaction-panel').classList.remove('hidden');
            document.getElementById('deploy-placeholder').classList.add('hidden');
            
            // 상태 초기화
            if(currentTab === 1) contractState = { greet: "Hello World" };
            if(currentTab === 2) contractState = { _greeting: "Hello, World!" };
            if(currentTab === 3) contractState = { number: 10, _number: 10 };

            renderInteractionButtons();
            showToast("🚀 컨트랙트 배포 완료!");
            logConsole("🔶 트랜잭션 성공: 컨트랙트가 배포되었습니다. (Gas Used: 125,403)");
        }

        // 우측 인터랙션 버튼 렌더링
        function renderInteractionButtons() {
            const container = document.getElementById('functions-container');
            container.innerHTML = '';
            
            const code = document.getElementById('editor').value;

            if (currentTab === 1 || (currentTab === 3 && code.includes('public number'))) {
                const varName = currentTab === 1 ? 'greet' : 'number';
                container.innerHTML += `<button onclick="callView('${varName}')" class="bg-[#10b981] hover:bg-[#059669] text-white py-2 px-4 rounded text-left font-mono text-sm shadow-md">${varName}</button>
                <div id="res-${varName}" class="text-xs text-gray-400 ml-2"></div>`;
            }

            if (currentTab === 2 || code.includes('function greet()')) {
                container.innerHTML += `<button onclick="callView('_greeting')" class="bg-[#10b981] hover:bg-[#059669] text-white py-2 px-4 rounded text-left font-mono text-sm shadow-md">greet</button>
                <div id="res-_greeting" class="text-xs text-gray-400 ml-2"></div>`;
                
                container.innerHTML += `<div class="flex flex-col gap-1 mt-2">
                    <input type="text" id="input-setGreeting" placeholder="newGreeting (string)" class="bg-[#0a0e27] border border-gray-600 p-2 text-sm rounded outline-none focus:border-[#f59e0b]">
                    <button onclick="callSet('setGreeting')" class="bg-[#f59e0b] hover:bg-[#d97706] text-white py-2 px-4 rounded text-left font-mono text-sm shadow-md">setGreeting</button>
                </div>`;
            }

            // 도전과제 해결 감지 (getNumber, setNumber)
            if (currentTab === 3 && code.includes('getNumber')) {
                container.innerHTML += `<button onclick="callView('_number')" class="bg-[#10b981] hover:bg-[#059669] text-white py-2 px-4 rounded text-left font-mono text-sm shadow-md">getNumber</button>
                <div id="res-_number" class="text-xs text-gray-400 ml-2"></div>`;
            }
            if (currentTab === 3 && code.includes('setNumber')) {
                container.innerHTML += `<div class="flex flex-col gap-1 mt-2">
                    <input type="number" id="input-setNumber" placeholder="newNumber (int)" class="bg-[#0a0e27] border border-gray-600 p-2 text-sm rounded outline-none focus:border-[#f59e0b]">
                    <button onclick="callSet('setNumber')" class="bg-[#f59e0b] hover:bg-[#d97706] text-white py-2 px-4 rounded text-left font-mono text-sm shadow-md">setNumber</button>
                </div>`;
            }
        }

        // View/Pure 함수 시뮬레이션
        function callView(key) {
            const resDiv = document.getElementById(`res-${key}`);
            resDiv.innerText = `↳ 0: ${typeof contractState[key]} : ${contractState[key]}`;
            logConsole(`✅ 호출 (View): 값을 성공적으로 읽었습니다. 결과 = ${contractState[key]}`);
        }

        // State Change 함수 시뮬레이션
        function callSet(funcName) {
            const inputVal = document.getElementById(`input-${funcName}`).value;
            if(!inputVal) return showToast("값을 입력하세요!");

            if(funcName === 'setGreeting') contractState['_greeting'] = inputVal;
            if(funcName === 'setNumber') contractState['_number'] = parseInt(inputVal);

            showToast("🔶 트랜잭션 전송됨!");
            logConsole(`🔶 트랜잭션 성공: ${funcName} 함수 실행 완료. (Gas Used: 43,210)`);
        }

        // 토스트 알림
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 3000);
        }

        // 콘솔 로깅
        function logConsole(msg) {
            const panel = document.getElementById('console-panel');
            const time = new Date().toLocaleTimeString();
            panel.innerHTML += `<div class="border-b border-gray-800 pb-1">
                <span class="text-gray-500">[${time}]</span> ${msg}
            </div>`;
            panel.scrollTop = panel.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('console-panel').innerHTML = '';
        }

        // 단축키
        document.addEventListener('keydown', (e) => {
            if(e.key === '1' && document.getElementById('launcher').style.display !== 'none') {
                startLab();
            }
            if(e.key === 'Escape' && document.getElementById('launcher').style.display === 'none') {
                showLauncher();
            }
            if(e.ctrlKey && e.key === 'Enter') {
                compileCode();
            }
        });
    </script>
</body>
</html>
